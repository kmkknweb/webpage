<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดตั้งแอปศาลเจ้า</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d88d14">

  <style>
    body{
      font-family:'Kanit',sans-serif;
      text-align:center;
      padding:40px 20px;
      background:#fffdf8;
      color:#5b3b22;
    }

    .box{
      max-width:420px;
      margin:auto;
      background:#fff;
      padding:28px;
      border-radius:24px;
      box-shadow:0 15px 30px rgba(0,0,0,.08);
    }

    h1{
      font-size:26px;
      color:#a7501c;
    }

    p{
      color:#8a6a4d;
      line-height:1.8;
    }

    button{
      margin-top:18px;
      padding:14px 24px;
      border:none;
      border-radius:999px;
      font-size:16px;
      background:linear-gradient(180deg,#f0bc3f,#d88d14);
      color:#fff;
      cursor:pointer;
    }

    .hint{
      margin-top:12px;
      font-size:13px;
      color:#999;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>ติดตั้งแอปศาลเจ้า</h1>
  <p>เพิ่มแอปลงหน้าจอมือถือเพื่อใช้งานได้สะดวก รวดเร็ว และเหมือนแอปจริง</p>

  <button id="installBtn">ติดตั้งแอป</button>

  <div id="hint" class="hint"></div>
</div>

<script>
let deferredPrompt = null;
const btn = document.getElementById('installBtn');
const hint = document.getElementById('hint');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

btn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
  } else {
    const ua = navigator.userAgent.toLowerCase();

    if (ua.includes('android')) {
      hint.textContent = "กดเมนู ⋮ แล้วเลือก Install app";
    } else if (ua.includes('iphone')) {
      hint.textContent = "กด Share แล้วเลือก Add to Home Screen";
    } else {
      hint.textContent = "เปิดผ่าน Chrome หรือ Safari";
    }
  }
});
</script>

</body>
</html>
