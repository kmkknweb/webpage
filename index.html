<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าปึงเถ่ากงม่า ขอนแก่น</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: 'Prompt', sans-serif;
  overflow: hidden;
}

/* พื้นหลัง glow */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,180,0,0.15), transparent 60%);
}

/* FRAME กลาง */
.frame {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  height: 75vh;
  border-radius: 25px;
  overflow: hidden;
  box-shadow:
    0 0 60px rgba(255,180,0,0.25),
    inset 0 0 40px rgba(255,200,100,0.2);
}

/* ภาพ */
.frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
}

/* TEXT */
.content {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  color: #fff;
}

.content h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.content p {
  font-size: 16px;
  opacity: 0.9;
}

/* BUTTON */
.btn {
  margin: 10px;
  padding: 10px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  transition: 0.3s;
}

.btn-gold {
  background: linear-gradient(45deg, gold, orange);
}

.btn-white {
  background: rgba(255,255,255,0.9);
}

/* hover effect */
.btn:hover {
  transform: scale(1.05);
}

/* ลอยนิดๆ */
.frame {
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-10px); }
  100% { transform: translate(-50%, -50%) translateY(0); }
}
</style>

</head>

<body>

<!-- เสียง -->
<audio autoplay loop>
  <source src="audio/ambience.mp3" type="audio/mpeg">
</audio>

<!-- FRAME -->
<div class="frame">

  <img src="images/hero.jpg">

  <div class="overlay"></div>

  <div class="content">
    <h1>ศาลเจ้าปึงเถ่ากงม่า ขอนแก่น</h1>
    <p>ศูนย์รวมศรัทธาและวัฒนธรรมของชุมชน</p>

    <button class="btn btn-gold">เข้าสู่ Virtual Tour</button>
    <button class="btn btn-white">ไหว้เจ้าออนไลน์</button>
  </div>

</div>

</body>
</html>
