<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🔥 พื้นหลังให้ลึก */
body::before {
  content: "";
  position: absolute;
  width: 140%;
  height: 140%;
  background: radial-gradient(circle,
    rgba(255,200,120,0.12),
    rgba(0,0,0,0) 60%);
  filter: blur(50px);
}

/* 🔥 กล่องหลัก (ไม่เต็มจอ) */
.link {
  width: 70vw;   /* 🔥 แคบลง */
  height: 60vh;  /* 🔥 เตี้ยลง ให้มีพื้นที่บนล่าง */
  display: block;
  position: relative;
  border-radius: 28px;
  text-decoration: none;
}

/* 🔥 glow รอบกรอบ */
.link::before {
  content: "";
  position: absolute;
  inset: -35px;
  border-radius: 40px;
  background: radial-gradient(circle,
    rgba(255,200,100,0.25),
    rgba(0,0,0,0) 70%);
  filter: blur(35px);
  z-index: -1;
}

/* 🔥 กรอบชั้นนอก */
.frame {
  width: 100%;
  height: 100%;
  padding: 14px;
  border-radius: 28px;
  background: linear-gradient(145deg, #2b1f11, #000);
  box-shadow:
    0 0 70px rgba(255,180,0,0.15),
    inset 0 0 25px rgba(255,200,100,0.2);
}

/* 🔥 กรอบกลาง */
.frame-inner {
  width: 100%;
  height: 100%;
  padding: 10px;
  border-radius: 18px;
  background: linear-gradient(145deg, #9a7542, #3a2a14);
  box-shadow:
    inset 0 0 20px rgba(255,230,160,0.35);
}

/* 🔥 กรอบใน */
.frame-core {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

/* ภาพ */
.frame-core img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 1s;
}

/* overlay */
.frame-core::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.2);
}

/* 🔥 ลอยเบาๆ */
.link {
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

/* hover */
.link:hover img {
  transform: scale(1.04);
}
</style>

</head>

<body>

<a href="home.html" class="link">

  <div class="frame">
    <div class="frame-inner">
      <div class="frame-core">
        <img src="images/hero.jpg">
      </div>
    </div>
  </div>

</a>

</body>
</html>
