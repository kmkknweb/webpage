<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    :root{
      --bg-1:#030303;
      --bg-2:#0b0b0b;
      --gold-1:#2e2112;
      --gold-2:#5b4425;
      --gold-3:#8f6b38;
      --gold-4:#c89b58;
      --gold-5:#f0d3a0;
      --glow-1:rgba(255,190,90,.18);
      --glow-2:rgba(255,220,150,.12);
      --shadow:rgba(0,0,0,.55);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,180,60,.10) 0%, rgba(255,180,60,.05) 18%, rgba(0,0,0,0) 48%),
        radial-gradient(circle at 50% 50%, rgba(120,40,10,.10) 0%, rgba(0,0,0,0) 55%),
        linear-gradient(180deg, #111 0%, #050505 35%, #020202 100%);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03), transparent 60%),
        linear-gradient(90deg, rgba(255,255,255,.015), rgba(255,255,255,0), rgba(255,255,255,.015));
      mix-blend-mode: screen;
    }

    body::after{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      background:
        radial-gradient(circle at center, rgba(255,210,120,.05), transparent 35%),
        radial-gradient(circle at 30% 30%, rgba(255,120,40,.03), transparent 25%),
        radial-gradient(circle at 70% 70%, rgba(255,180,100,.03), transparent 25%);
      filter: blur(30px);
      animation: ambientPulse 7s ease-in-out infinite;
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: clamp(14px, 2.2vw, 30px);
      perspective: 1600px;
    }

    .welcome-link{
      position:relative;
      display:block;
      width:min(92vw, 1420px);
      height:min(84vh, 920px);
      text-decoration:none;
      border-radius:34px;
      transform-style:preserve-3d;
      animation: floatFrame 7s ease-in-out infinite;
      transition: transform .35s ease, filter .35s ease;
      filter: drop-shadow(0 26px 60px rgba(0,0,0,.55));
      cursor:pointer;
    }

    .welcome-link:hover{
      transform: translateY(-3px) scale(1.005);
      filter:
        drop-shadow(0 30px 70px rgba(0,0,0,.60))
        drop-shadow(0 0 24px rgba(255,196,110,.08));
    }

    .welcome-link:active{
      transform: scale(.995);
    }

    /* วงแสงนอกสุด */
    .halo{
      position:absolute;
      inset:-18px;
      border-radius:42px;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,220,140,.18), transparent 58%);
      filter: blur(24px);
      opacity:.9;
      animation: haloPulse 5s ease-in-out infinite;
    }

    /* กรอบชั้น 1 */
    .frame-outer{
      position:absolute;
      inset:0;
      border-radius:34px;
      padding:18px;
      background:
        linear-gradient(145deg, #151515 0%, #050505 22%, #2d2113 52%, #0a0a0a 78%, #191919 100%);
      box-shadow:
        0 0 0 1px rgba(255,233,200,.08),
        0 0 0 2px rgba(255,194,108,.06),
        inset 0 1px 0 rgba(255,245,220,.08),
        inset 0 0 34px rgba(255,185,90,.07),
        0 0 50px rgba(255,185,90,.08);
      overflow:hidden;
    }

    /* ลายวิ่งบางๆ บนกรอบ */
    .frame-outer::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        linear-gradient(120deg,
          rgba(255,255,255,0) 0%,
          rgba(255,228,180,.06) 18%,
          rgba(255,255,255,0) 34%,
          rgba(255,255,255,0) 100%);
      transform: translateX(-120%);
      animation: shineSweep 6.5s linear infinite;
      pointer-events:none;
    }

    /* กรอบชั้น 2 */
    .frame-mid{
      position:relative;
      width:100%;
      height:100%;
      border-radius:24px;
      padding:12px;
      background:
        linear-gradient(145deg, #4b371e 0%, #8b6737 18%, #d5ab6a 32%, #6b4d27 58%, #2c1f12 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,234,198,.35),
        inset 0 2px 8px rgba(255,245,225,.18),
        inset 0 -10px 20px rgba(0,0,0,.25),
        0 10px 24px rgba(0,0,0,.18);
      overflow:hidden;
    }

    /* ลายเส้นในกรอบ */
    .frame-mid::before{
      content:"";
      position:absolute;
      inset:7px;
      border-radius:18px;
      border:1px solid rgba(255,234,190,.35);
      pointer-events:none;
      box-shadow:
        inset 0 0 0 1px rgba(255,221,170,.08),
        0 0 18px rgba(255,205,110,.07);
    }

    /* กรอบชั้น 3 */
    .frame-inner{
      position:relative;
      width:100%;
      height:100%;
      border-radius:18px;
      padding:10px;
      background:
        linear-gradient(180deg, #241a10 0%, #100d09 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,223,168,.18),
        inset 0 0 24px rgba(255,193,92,.10);
      overflow:hidden;
    }

    /* เส้นขอบด้านในสุด */
    .frame-inner::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:12px;
      border:1px solid rgba(255,235,190,.22);
      pointer-events:none;
    }

    .image-wrap{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      border-radius:10px;
      background:#000;
      box-shadow:
        inset 0 0 0 1px rgba(255,235,200,.10),
        inset 0 0 45px rgba(0,0,0,.22);
    }

    .hero-image{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform: scale(1.02);
      filter:
        saturate(1.04)
        contrast(1.03)
        brightness(.92);
      transition: transform 1.2s ease, filter 1.2s ease;
      animation: imageBreath 9s ease-in-out infinite;
    }

    .welcome-link:hover .hero-image{
      transform: scale(1.045);
      filter:
        saturate(1.08)
        contrast(1.05)
        brightness(.95);
    }

    /* overlay หลัก */
    .image-wrap::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(0,0,0,.24) 0%, rgba(0,0,0,.10) 28%, rgba(0,0,0,.14) 68%, rgba(0,0,0,.28) 100%),
        radial-gradient(circle at 50% 50%, rgba(255,220,140,.10), transparent 40%),
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.04), transparent 28%);
      z-index:2;
    }

    /* vignette */
    .image-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0) 48%, rgba(0,0,0,.16) 76%, rgba(0,0,0,.38) 100%);
      z-index:3;
    }

    /* แสงมุม 4 ด้าน */
    .corner{
      position:absolute;
      width:90px;
      height:90px;
      pointer-events:none;
      z-index:4;
      opacity:.65;
      filter: blur(.2px);
    }

    .corner::before,
    .corner::after{
      content:"";
      position:absolute;
      background: linear-gradient(90deg, rgba(255,224,170,.80), rgba(255,196,96,.18));
      box-shadow: 0 0 10px rgba(255,215,140,.12);
    }

    .corner::before{
      height:2px;
      width:70px;
    }

    .corner::after{
      width:2px;
      height:70px;
    }

    .corner.tl{ top:18px; left:18px; }
    .corner.tl::before{ top:0; left:0; }
    .corner.tl::after{ top:0; left:0; }

    .corner.tr{ top:18px; right:18px; }
    .corner.tr::before{ top:0; right:0; }
    .corner.tr::after{ top:0; right:0; }

    .corner.bl{ bottom:18px; left:18px; }
    .corner.bl::before{ bottom:0; left:0; }
    .corner.bl::after{ bottom:0; left:0; }

    .corner.br{ bottom:18px; right:18px; }
    .corner.br::before{ bottom:0; right:0; }
    .corner.br::after{ bottom:0; right:0; }

    /* เงาสะท้อนด้านล่าง */
    .reflection{
      position:absolute;
      left:5%;
      right:5%;
      bottom:-36px;
      height:70px;
      border-radius:50%;
      pointer-events:none;
      background: radial-gradient(ellipse at center, rgba(255,200,100,.16), rgba(0,0,0,0) 68%);
      filter: blur(18px);
      opacity:.6;
      z-index:-1;
      animation: reflectionPulse 5.8s ease-in-out infinite;
    }

    /* ฟิล์มเกรนเบาๆ */
    .grain{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.06;
      z-index:5;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0.45px, transparent 0.6px);
      background-size: 10px 10px;
      mix-blend-mode: soft-light;
    }

    @keyframes floatFrame{
      0%,100%{ transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
      50%{ transform: translateY(-8px) rotateX(.15deg) rotateY(-.15deg); }
    }

    @keyframes haloPulse{
      0%,100%{ opacity:.78; transform: scale(1); }
      50%{ opacity:1; transform: scale(1.015); }
    }

    @keyframes ambientPulse{
      0%,100%{ transform: scale(1); opacity:1; }
      50%{ transform: scale(1.03); opacity:.92; }
    }

    @keyframes reflectionPulse{
      0%,100%{ opacity:.48; transform: scaleX(1); }
      50%{ opacity:.72; transform: scaleX(1.03); }
    }

    @keyframes shineSweep{
      0%{ transform: translateX(-120%); opacity:.0; }
      8%{ opacity:1; }
      30%{ opacity:.55; }
      45%{ transform: translateX(120%); opacity:0; }
      100%{ transform: translateX(120%); opacity:0; }
    }

    @keyframes imageBreath{
      0%,100%{ transform: scale(1.02); }
      50%{ transform: scale(1.035); }
    }

    /* มือถือ */
    @media (max-width: 900px){
      .welcome-link{
        width: 94vw;
        height: 78vh;
        border-radius: 24px;
      }

      .halo{ inset:-12px; border-radius:30px; }
      .frame-outer{ padding:12px; border-radius:24px; }
      .frame-mid{ padding:8px; border-radius:16px; }
      .frame-inner{ padding:7px; border-radius:12px; }

      .corner{
        width:58px;
        height:58px;
      }
      .corner::before{ width:42px; }
      .corner::after{ height:42px; }

      .corner.tl,.corner.tr{ top:12px; }
      .corner.bl,.corner.br{ bottom:12px; }
      .corner.tl,.corner.bl{ left:12px; }
      .corner.tr,.corner.br{ right:12px; }
    }

    @media (max-width: 560px){
      .stage{
        padding:10px;
      }

      .welcome-link{
        width: 96vw;
        height: 74vh;
      }

      .frame-outer{
        padding:10px;
      }

      .frame-mid{
        padding:7px;
      }

      .frame-inner{
        padding:6px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <a class="welcome-link" href="home.html" aria-label="Enter">
      <div class="halo"></div>
      <div class="frame-outer">
        <div class="frame-mid">
          <div class="frame-inner">
            <div class="image-wrap">
              <img class="hero-image" src="images/hero.jpg" alt="ศาลเจ้า" />
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
              <div class="grain"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="reflection"></div>
    </a>
  </div>
</body>
</html>
