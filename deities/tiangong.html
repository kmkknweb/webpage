<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เทพฟ้าดิน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;800&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:white;
  font-family:'Prompt',sans-serif;
  overflow:hidden;
}

/* พื้นหลัง */
body::before{
  content:"";
  position:absolute;
  width:140%;
  height:140%;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,200,100,.2), transparent 25%),
    radial-gradient(circle at 70% 80%, rgba(255,180,80,.2), transparent 30%);
}

/* กลางจอ */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* glow */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(255,200,100,.4), transparent);
  filter:blur(40px);
}

/* รูป */
.god{
  position:relative;
  width:260px;
  animation:float 5s ease-in-out infinite;
}

.god img{
  width:100%;
  filter:
    drop-shadow(0 0 20px rgba(255,200,100,.4))
    drop-shadow(0 10px 25px rgba(0,0,0,.2));
}

/* ข้อความ */
.title{
  font-family:'Kanit',sans-serif;
  font-size:32px;
  margin-top:20px;
  color:#c56a14;
}

.subtitle{
  margin-top:12px;
  font-size:16px;
  color:#8a6a4d;
}

/* ปุ่ม */
.btn{
  margin-top:30px;
  padding:14px 28px;
  border-radius:30px;
  border:none;
  font-size:18px;
  background:linear-gradient(45deg,#ffd86b,#d88d14);
  color:white;
  cursor:pointer;
  animation:pulse 2.5s infinite;
}

/* animation */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

  <div class="glow"></div>

  <div class="god">
    <img src="images/tiangong.png">
  </div>

  <div class="title">
    อธิษฐาน…ไม่ใช่เพื่อขอ
  </div>

  <div class="subtitle">
    แต่เพื่อให้บางอย่างกับชีวิต
  </div>

  <button class="btn">
    ตั้งใจ
  </button>

</div>

</body>
</html>
