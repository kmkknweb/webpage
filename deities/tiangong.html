<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เทพฟ้าดิน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;800&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
  background:#fffdf8;
}

/* layout */
.main{
  display:grid;
  grid-template-columns: 1fr 1.2fr;
  min-height:100vh;
}

/* LEFT */
.left{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.left::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(255,200,100,.4), transparent);
  filter:blur(40px);
}

.left img{
  width:70%;
  max-width:420px;
  animation:float 5s infinite ease-in-out;
  filter:drop-shadow(0 0 40px rgba(255,200,100,.4));
}

/* RIGHT */
.right{
  padding:40px;
  overflow-y:auto;
}

/* title */
.title{
  font-family:'Kanit';
  font-size:36px;
  color:#c46a14;
}

.subtitle{
  margin-top:10px;
  color:#8a6a4d;
}

/* options */
.options{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.option{
  padding:14px;
  border-radius:12px;
  border:1px solid #e6c27a;
  background:#fff8e8;
  cursor:pointer;
}

/* card */
.card{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  display:none;
}

.card.show{
  display:block;
}

/* buttons */
.btn{
  margin-top:20px;
  padding:14px 20px;
  border-radius:30px;
  border:none;
  background:linear-gradient(#ffd86b,#d88d14);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* gong animation */
.gong{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  opacity:0;
  pointer-events:none;
}

.gong.show{
  animation:gongAnim 4s ease forwards;
}

@keyframes gongAnim{
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เทพฟ้าดิน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;800&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
  background:#fffdf8;
}

/* layout */
.main{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  min-height:100vh;
}

.left{
  display:flex;
  align-items:center;
  justify-content:center;
}

.left img{
  width:70%;
  animation:float 5s infinite;
}

.right{
  padding:40px;
}

h1{
  font-family:'Kanit';
  color:#c56a14;
}

/* options */
.option{
  padding:14px;
  border:1px solid #e6c27a;
  margin:6px;
  display:inline-block;
  cursor:pointer;
  border-radius:10px;
}

/* card */
.card{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:white;
  display:none;
}

.card.show{
  display:block;
}

.btn{
  margin-top:20px;
  padding:14px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(#ffd86b,#d88d14);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ===== overlay ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* ===== gong CSS ===== */
.gong{
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd86b,#c98a12);
  box-shadow:0 0 50px gold;
  position:relative;
}

.gong::after{
  content:"";
  width:50px;
  height:50px;
  background:#7a4d00;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* stick */
.stick{
  width:160px;
  height:14px;
  background:#8b5a2b;
  position:absolute;
  right:-140px;
  top:100px;
  transform:rotate(-30deg);
  transform-origin:left center;
}

/* glow effect */
.glow{
  position:absolute;
  width:250px;
  height:250px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,220,120,.5),transparent);
  opacity:0;
}

/* animation */
.play .stick{
  animation:hit .4s ease 3;
}

.play .gong{
  animation:shake .4s ease 3;
}

.play .glow{
  animation:flash .4s ease 3;
}

@keyframes hit{
  0%{transform:rotate(-30deg);}
  50%{transform:rotate(10deg);}
  100%{transform:rotate(-30deg);}
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

@keyframes flash{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.text-overlay{
  margin-top:20px;
  font-size:18px;
  color:#8a6a4d;
  text-align:center;
}
</style>
</head>

<body>

<div class="main">

<div class="left">
  <img src="../images/tiangong.png">
</div>

<div class="right">

<h1>เทพฟ้าดิน</h1>

<div class="option" onclick="selectWish('สมดุล')">สมดุล</div>
<div class="option" onclick="selectWish('ราบรื่น')">ราบรื่น</div>
<div class="option" onclick="selectWish('ชัดเจน')">ชัดเจน</div>
<div class="option" onclick="selectWish('แรงใจ')">แรงใจ</div>

<div class="card" id="card">
<h3 id="title"></h3>
<p id="text"></p>

<button class="btn" onclick="playGong()">ตีฆ้อง</button>
</div>

</div>
</div>

<!-- overlay -->
<div class="overlay" id="overlay">
  <div style="position:relative">
    <div class="glow"></div>
    <div class="gong"></div>
    <div class="stick"></div>
  </div>
  <div class="text-overlay">กำลังส่งคำอธิษฐานไปถึงฟ้าดิน...</div>
</div>

<audio id="sound" src="../audio/gong.mp3"></audio>

<script>

const data={
'สมดุล':`วันนี้อาจมีหลายสิ่งที่ยังไม่ลงตัว  
แต่ขอให้ใจค่อยๆกลับมาอยู่ในจุดที่พอดี  

ไม่ต้องเร่ง ไม่ต้องฝืน  
ปล่อยให้ทุกอย่างค่อยๆคลี่คลาย  

สิ่งที่หนักจะเบาลง  
สิ่งที่สับสนจะชัดขึ้น  
และชีวิตจะกลับมาอยู่ในจังหวะของมันเอง`,

'ราบรื่น':`ขอให้ทุกสิ่งที่กำลังทำ  
ค่อยๆดำเนินไปอย่างราบรื่น  

ปัญหาจะคลี่คลาย  
อุปสรรคจะเบาลง  
และเส้นทางจะเปิดออกทีละนิด`,

'ชัดเจน':`สิ่งที่สับสนจะค่อยๆชัดขึ้น  
เมื่อใจนิ่งพอ  

คำตอบที่ตามหา  
จะค่อยๆปรากฏ  
และนำทางไปในทิศที่ถูกต้อง`,

'แรงใจ':`แม้วันนี้จะเหนื่อย  
แต่ขอให้ยังมีแรงก้าวต่อ  

หัวใจยังไม่ยอมแพ้  
และยังเชื่อในเส้นทางของตัวเอง`};

function selectWish(t){
card.classList.add('show');
title.innerText=t;
text.innerText=data[t];
}

function playGong(){
overlay.classList.add('show','play');
sound.play();

setTimeout(()=>{
overlay.classList.remove('show','play');
},3000);
}

</script>

</body>
</html>
