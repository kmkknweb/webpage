<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เทพฟ้าดิน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;800&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
  background:#fffdf8;
}

/* layout */
.main{
  display:grid;
  grid-template-columns: 1fr 1.2fr;
  min-height:100vh;
}

/* LEFT */
.left{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.left::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(255,200,100,.4), transparent);
  filter:blur(40px);
}

.left img{
  width:70%;
  max-width:420px;
  animation:float 5s infinite ease-in-out;
  filter:drop-shadow(0 0 40px rgba(255,200,100,.4));
}

/* RIGHT */
.right{
  padding:40px;
  overflow-y:auto;
}

/* title */
.title{
  font-family:'Kanit';
  font-size:36px;
  color:#c46a14;
}

.subtitle{
  margin-top:10px;
  color:#8a6a4d;
}

/* options */
.options{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.option{
  padding:14px;
  border-radius:12px;
  border:1px solid #e6c27a;
  background:#fff8e8;
  cursor:pointer;
}

/* card */
.card{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  display:none;
}

.card.show{
  display:block;
}

/* buttons */
.btn{
  margin-top:20px;
  padding:14px 20px;
  border-radius:30px;
  border:none;
  background:linear-gradient(#ffd86b,#d88d14);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* gong animation */
.gong{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  opacity:0;
  pointer-events:none;
}

.gong.show{
  animation:gongAnim 4s ease forwards;
}

@keyframes gongAnim{
  0%{opacity:0; transform:translate(-50%,20px) scale(.8);}
  20%{opacity:1;}
  60%{transform:translate(-50%,-120px) scale(1.2);}
  100%{opacity:0; transform:translate(-50%,-200px) scale(1);}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* mobile */
@media(max-width:900px){
  .main{
    grid-template-columns:1fr;
  }
  .left{
    height:300px;
  }
}
</style>
</head>

<body>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <img src="../images/tiangong.png">
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="title">เทพฟ้าดิน</div>
    <div class="subtitle">วันนี้…อยากตั้งใจเรื่องอะไร</div>

    <div class="options">
      <div class="option" onclick="selectWish('สมดุล')">สมดุล</div>
      <div class="option" onclick="selectWish('ราบรื่น')">ราบรื่น</div>
      <div class="option" onclick="selectWish('ชัดเจน')">ชัดเจน</div>
      <div class="option" onclick="selectWish('แรงใจ')">แรงใจ</div>
    </div>

    <div class="card" id="card">
      <h3 id="wishTitle"></h3>
      <p id="wishText"></p>

      <button class="btn" onclick="playGong()">ตีฆ้อง</button>
    </div>

  </div>

</div>

<!-- gong animation -->
<div class="gong" id="gong">🔔</div>

<!-- audio -->
<audio id="gongSound" src="../audio/gong.mp3"></audio>

<script>
function selectWish(text){
  document.getElementById('card').classList.add('show');
  document.getElementById('wishTitle').innerText = text;

  document.getElementById('wishText').innerText =
    'ขอให้สิ่งที่ตั้งใจในวันนี้ค่อยๆ คลี่คลายไปในทางที่ดี';
}

function playGong(){
  document.getElementById('gongSound').play();

  const gong = document.getElementById('gong');
  gong.classList.add('show');

  setTimeout(()=>{
    gong.classList.remove('show');
  },4000);
}
</script>

</body>
</html>
