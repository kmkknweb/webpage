<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เทพฟ้าดิน · เทียนกง</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;700;800&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#ffd86b; --gold2:#f0bc3f; --gold3:#d88d14;
  --ink:#5b3b22; --sub:#8a6a4d; --bg:#fffdf8;
  --line:rgba(216,141,20,.14);
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;
  font-family:'Prompt',sans-serif;
  color:var(--ink);
  background:var(--bg);
  overflow-x:hidden; overflow-y:auto;
}

/* layout */
.main{display:grid; grid-template-columns:1fr 1.2fr; min-height:100vh;}
.left{display:flex; align-items:center; justify-content:center; padding:20px;}
.left::before{
  content:""; position:absolute; width:420px;height:420px;
  background:radial-gradient(circle, rgba(255,200,100,.45), transparent);
  filter:blur(50px);
}
.left img{
  width:90%; max-width:560px; position:relative;
  animation:float 5s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(255,200,100,.45))
         drop-shadow(0 16px 36px rgba(198,129,15,.18));
}

.right{padding:32px 28px 80px;}
.back{
  display:inline-block; text-decoration:none; font-size:14px;
  color:#b77310; padding:10px 14px; border-radius:999px;
  background:rgba(255,206,112,.12); border:1px solid var(--line);
  margin-bottom:14px;
}
.title{font-family:'Kanit'; font-size:clamp(30px,4.2vw,48px); margin:0; color:#c56a14;}
.subtitle{margin-top:10px; color:var(--sub); line-height:1.9;}

.options{margin-top:20px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.option{
  padding:14px; border-radius:14px; border:1px solid var(--line);
  background:#fff8e8; cursor:pointer; text-align:center; font-weight:600;
}
.option.active{background:linear-gradient(180deg, rgba(255,216,107,.25), rgba(255,216,107,.12)); color:#a7501c;}

.card{
  margin-top:20px; padding:20px; border-radius:20px; background:#fff;
  box-shadow:0 16px 35px rgba(0,0,0,.05); display:none;
}
.card.show{display:block;}
.card h3{margin:0 0 10px; font-family:'Kanit'; color:#a7501c;}
.card p{line-height:1.9; color:var(--sub); white-space:pre-line;}

.cta{
  margin-top:22px; padding:18px; border-radius:18px;
  background:#fffaf0; border:1px solid var(--line);
}
.cta-title{font-family:'Kanit'; font-size:20px; color:#a7501c;}
.cta-desc{margin-top:6px; color:var(--sub); font-size:14px;}
.btn{
  margin-top:14px; padding:14px 24px; border:none; border-radius:999px;
  background:linear-gradient(var(--gold1),var(--gold3));
  color:#fff; font-size:18px; font-family:'Kanit'; cursor:pointer;
}

/* overlay + gong (CSS ล้วน) */
.overlay{
  position:fixed; inset:0; z-index:999;
  background:rgba(255,255,255,.86); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  opacity:0; pointer-events:none; transition:.35s;
}
.overlay.show{opacity:1; pointer-events:auto;}

.gong{
  width:240px; height:240px; border-radius:50%;
  background:radial-gradient(circle,#ffd86b,#c98a12);
  box-shadow:0 0 60px gold; position:relative;
}
.gong::after{
  content:""; width:56px;height:56px; background:#7a4d00; border-radius:50%;
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
}
.stick{
  width:180px; height:14px; background:#8b5a2b; position:absolute;
  right:-160px; top:110px; transform:rotate(-30deg); transform-origin:left center;
}
.glow{
  position:absolute; width:260px;height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,220,120,.6),transparent); opacity:0;
}

/* 3 hits */
.play .stick{animation:hit 3s ease 3;}
.play .gong{animation:shake 3s ease 3;}
.play .glow{animation:flash 3s ease 3;}

@keyframes hit{
  0%{transform:rotate(-30deg);} 50%{transform:rotate(12deg);} 100%{transform:rotate(-30deg);}
}
@keyframes shake{
  0%{transform:translateX(0);} 25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);} 75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}
@keyframes flash{0%{opacity:0;}50%{opacity:1;}100%{opacity:0;}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.overlay-text{margin-top:20px; color:#8a6a4d; text-align:center; font-size:16px;}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .left img{width:60%;max-width:300px;}
}
</style>
</head>

<body>
<div class="main">
  <div class="left">
    <img src="../images/tiangong.png" alt="เทพฟ้าดิน">
  </div>

  <div class="right">
    <a href="../deities.html" class="back">← กลับหน้าองค์เทพ</a>

    <h1 class="title">เทพฟ้าดิน</h1>
    <p class="subtitle">
      อธิษฐานไม่ใช่เพื่อขอ แต่เพื่อให้บางอย่างกับชีวิต  
      เลือกสิ่งที่อยากตั้งใจ แล้วปล่อยให้ใจค่อยๆ กลับสู่สมดุล
    </p>

    <div class="options">
      <div class="option" data-type="สมดุล">สมดุล</div>
      <div class="option" data-type="ราบรื่น">ราบรื่น</div>
      <div class="option" data-type="ชัดเจน">ชัดเจน</div>
      <div class="option" data-type="แรงใจ">แรงใจ</div>
    </div>

    <div class="card" id="card">
      <h3 id="title"></h3>
      <p id="text"></p>
    </div>

    <div class="cta">
      <div class="cta-title">ตีฆ้องเพื่อส่งคำอธิษฐาน</div>
      <div class="cta-desc">เมื่อพร้อมแล้ว กดเพื่อส่งสิ่งที่ตั้งใจไปถึงฟ้าดิน</div>
      <button class="btn" id="gongBtn">ตีฆ้อง 3 ครั้ง</button>
    </div>
  </div>
</div>

<!-- overlay -->
<div class="overlay" id="overlay">
  <div style="position:relative">
    <div class="glow"></div>
    <div class="gong"></div>
    <div class="stick"></div>
  </div>
  <div class="overlay-text">กำลังส่งคำอธิษฐานไปถึงฟ้าดิน...</div>
</div>

<audio id="sound" src="../audio/gong.mp3"></audio>

<script>
document.addEventListener('DOMContentLoaded', function(){

  const overlay = document.getElementById('overlay');
  const sound = document.getElementById('sound');
  const btn = document.getElementById('gongBtn');

  const card = document.getElementById('card');
  const title = document.getElementById('title');
  const text = document.getElementById('text');

  'สมดุล': `วันนี้อาจมีหลายสิ่งที่ยังไม่ลงตัว  
ทั้งความคิด ความรู้สึก และสิ่งที่ต้องเผชิญ  

ขอให้ใจค่อยๆ กลับมาอยู่ในจุดที่พอดี  
ไม่ต้องเร่ง ไม่ต้องฝืน ไม่ต้องกดดันตัวเองเกินไป  
ปล่อยให้ทุกอย่างค่อยๆ คลี่คลายไปตามจังหวะของมัน  
สิ่งที่หนักจะค่อยๆ เบาลง  
สิ่งที่สับสนจะค่อยๆ ชัดขึ้น  
และในที่สุด ชีวิตจะกลับมาอยู่ในสมดุลของมันเอง  
อย่างเงียบๆ แต่มั่นคง`,

    
'ราบรื่น': `สิ่งที่กำลังทำอยู่ อาจไม่ได้ง่ายเสมอไป  
แต่ขอให้ทุกอย่างค่อยๆ ดำเนินไปอย่างราบรื่น  
อุปสรรคที่เคยติดขัด  
ค่อยๆ คลี่คลายออกทีละนิด  
เส้นทางที่ดูซับซ้อน  
ค่อยๆ เปิดทางให้มองเห็นได้ชัดขึ้น  
ไม่จำเป็นต้องสมบูรณ์แบบในทันที  
แค่ก้าวต่อไปอย่างมั่นคง  
และให้ทุกอย่างไหลไปในทิศทางที่ดีขึ้น  
อย่างเป็นธรรมชาติ`,

    'ชัดเจน': `ในวันที่ใจยังสับสน  
และคำตอบยังไม่ปรากฏชัด  
ขอให้ความนิ่งค่อยๆ เข้ามาแทนที่ความวุ่นวาย  
ให้ความคิดค่อยๆ เรียงตัว  
และให้สิ่งสำคัญค่อยๆ ปรากฏขึ้น  
ไม่ต้องรีบตัดสินใจทุกอย่างในทันที  
แค่ค่อยๆ มอง ค่อยๆ เข้าใจ  
แล้วคำตอบที่แท้จริง  
จะค่อยๆ ชัดขึ้นในเวลาที่เหมาะสม  

พร้อมกับความมั่นใจที่ไม่ต้องฝืน`,

    'แรงใจ': `บางวันอาจเหนื่อย  
บางช่วงอาจรู้สึกเหมือนเดินต่อไม่ไหว  
แต่ขอให้ยังมีแรงเล็กๆ อยู่ในใจ  
ที่ยังไม่ยอมแพ้  
แม้จะช้า แม้จะหนัก  
แต่ยังคงก้าวต่อไปได้  
ให้หัวใจยังคงมีความหวัง  
และยังเชื่อในเส้นทางของตัวเอง  
และเมื่อมองย้อนกลับมา  
จะรู้ว่าทุกก้าวที่ผ่านมา  
มีความหมายมากกว่าที่คิด`

  };

  // select wish
  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');

      const t = el.dataset.type;
      card.classList.add('show');
      title.innerText = t;
      text.innerText = data[t];
    });
  });

  // fallback beep (ถ้าไฟล์ mp3 ไม่มา)
  function beep(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type='sine'; o.frequency.value=440;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
      o.stop(ctx.currentTime + 0.25);
    }catch(e){}
  }

  // play gong
  btn.addEventListener('click', ()=>{
    overlay.classList.remove('show','play'); // reset
    void overlay.offsetWidth;                // force reflow

    overlay.classList.add('show','play');

    // พยายามเล่นเสียง mp3 ก่อน
    if (sound){
      try{
        sound.currentTime = 0;
        const p = sound.play();
        if (p && typeof p.then === 'function'){
          p.catch(()=>beep()); // ถ้าโดนบล็อก/ไฟล์ไม่เจอ → beep
        }
      }catch(e){ beep(); }
    } else {
      beep();
    }

    // จังหวะ 3 ครั้ง (ช่วยเสริมเสียง)
    setTimeout(beep, 900);
    setTimeout(beep, 1800);

    setTimeout(()=>{
      overlay.classList.remove('show','play');
    }, 10000);
  });

});
</script>

</body>
</html>
