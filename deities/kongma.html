<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปึงเถ่ากงม่า</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  background:radial-gradient(circle,#1a0000,#000);
  color:white;
  text-align:center;
  overflow:hidden;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

img{
  width:260px;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 20px gold);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

h1{
  color:gold;
  margin:10px 0;
}

.card{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  width:260px;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  opacity:.4;
}

#qr{
  display:none;
  margin-top:10px;
}

#flash{
  position:fixed;
  width:250px;
  height:250px;
  background:radial-gradient(circle, gold, transparent);
  border-radius:50%;
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,-50%) scale(.5);
  transition:.5s;
}

.message{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:.5s;
}
.show{opacity:1}
</style>
</head>

<body>

<div class="container">

<img src="../images/kongma.png">

<h1>ปึงเถ่ากงม่า</h1>
<p>เทพผู้คุ้มครองและนำพาความสงบ</p>

<!-- การ์ดบริจาค -->
<div class="card">
  <h3>บริจาค</h3>
  <button onclick="showQR()">แสดง QR</button>
  <img id="qr" src="../images/qr.png" width="180">
  <button onclick="donated()">บริจาคแล้ว</button>
</div>

<!-- การ์ดรับพร -->
<div class="card">
  <h3>รับพร</h3>
  <button id="blessBtn" onclick="bless()" disabled>รับพร</button>
</div>

<a href="../deities.html" style="color:gold;margin-top:20px;">← กลับ</a>

</div>

<div id="flash"></div>
<div id="msg" class="message">พรแห่งความคุ้มครองได้มาถึงแล้ว</div>

<audio id="sound" src="../audio/bell.mp3"></audio>

<script>
const flash=document.getElementById("flash");
const msg=document.getElementById("msg");
const sound=document.getElementById("sound");
const blessBtn=document.getElementById("blessBtn");

function showQR(){
  document.getElementById("qr").style.display="block";
}

function donated(){
  blessBtn.disabled=false;
  msg.innerText="บุญกุศลได้ถูกส่งแล้ว";
  showMsg();
}

function bless(){
  flash.style.left="50%";
  flash.style.top="50%";
  flash.style.opacity=1;
  flash.style.transform="translate(-50%,-50%) scale(1.8)";

  setTimeout(()=>{
    flash.style.opacity=0;
    flash.style.transform="translate(-50%,-50%) scale(.5)";
  },600);

  msg.innerText="ขอให้ได้รับการคุ้มครองและความสงบ";
  showMsg();

  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function showMsg(){
  msg.classList.add("show");
  setTimeout(()=>msg.classList.remove("show"),2000);
}
</script>

</body>
</html>
